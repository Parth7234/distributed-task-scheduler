services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: task_scheduler
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5433:5432"          # 5433 on host to avoid clashing with local Postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"          # 6380 on host to avoid clashing with local Redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "postgresql://postgres@db/task_scheduler"
      REDIS_HOST: redis
      PYTHONUNBUFFERED: 1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    command: ["python", "worker.py"]
    environment:
      DATABASE_URL: "postgresql://postgres@db/task_scheduler"
      REDIS_HOST: redis
      PYTHONUNBUFFERED: 1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  sweeper:
    build: .
    command: ["python", "sweeper.py"]
    environment:
      DATABASE_URL: "postgresql://postgres@db/task_scheduler"
      REDIS_HOST: redis
      PYTHONUNBUFFERED: 1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
